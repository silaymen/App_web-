# ===============================
# Server Configuration
# ===============================
server.port=8082

spring.application.name=certification-service


# ===============================
# Datasource MySQL
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/certifications_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / Hibernate (Spring Boot 3.x)
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Important pour MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# ===============================
# Eureka Client Configuration
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true