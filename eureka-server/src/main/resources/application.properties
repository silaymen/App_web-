spring.application.name=eureka-server
server.port=8761

eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
# Overridden by EUREKA_INSTANCE_HOSTNAME env var in Docker
eureka.instance.hostname=${EUREKA_INSTANCE_HOSTNAME:localhost}

# Config Server (optional — picks up from env var in Docker)
spring.config.import=optional:configserver:${SPRING_CONFIG_IMPORT:http://localhost:8888}